<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markmap - Gravitation Mind Map</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b1326;
      font-family: 'Lexend', -apple-system, sans-serif;
      overflow: hidden;
    }
    .header {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      background: rgba(11, 19, 38, 0.95);
      backdrop-filter: blur(20px);
      padding: 15px 30px;
      border-radius: 12px;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }
    .header h1 {
      color: #6366F1;
      font-size: 24px;
      margin: 0 0 5px 0;
    }
    .header p {
      color: #818CF8;
      font-size: 12px;
      margin: 0;
    }
    #markmap {
      width: 100vw;
      height: 100vh;
    }
    .footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      background: rgba(11, 19, 38, 0.95);
      backdrop-filter: blur(20px);
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(45, 212, 191, 0.3);
      color: #2DD4BF;
      font-size: 11px;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #6366F1;
      font-size: 18px;
      z-index: 50;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 Markmap Test</h1>
    <p><strong>Light & Fast</strong> - Perfect for Socratic Learning</p>
  </div>

  <div class="loading" id="loading">Loading mind map...</div>
  <svg id="markmap"></svg>

  <div class="footer">
    ✨ Click nodes to expand/collapse • Drag to pan • Scroll to zoom
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
  
  <script>
    const markdown = `# Gravitation

## Newton's Law
### Formula
- F = Gm₁m₂/r²
- Inverse Square Law
### Constant
- G = 6.67 × 10⁻¹¹
### Applications
- Planetary Motion
- Satellites
- Tides

## Gravity (g)
### At Surface
- g = GM/R²
- Earth: 9.8 m/s²
- Moon: 1.6 m/s²
### With Height
- Decreases
- gₕ = g(1 - 2h/R)
### With Depth
- Decreases
- Zero at center

## Escape Velocity
### Concept
- Minimum velocity
- Independent of mass
### Formula
- vₑ = √(2GM/R)
- Earth: 11.2 km/s
- Moon: 2.4 km/s
### Energy
- KE + PE = 0

## Orbital Motion
### Kepler's Laws
#### First Law
- Elliptical orbits
- Sun at focus
#### Second Law
- Equal areas
- Equal time
#### Third Law
- T² ∝ r³
### Circular Orbits
- vₒ = √(GM/r)
- T = 2π√(r³/GM)
### Satellites
- Geostationary
- Polar
- LEO

## Potential Energy
### Formula
- U = -GMm/r
- Always negative
### Potential
- V = -GM/r
### Binding Energy
- Eᵦ = GMm/2r

## Field
### Strength
- g = GM/r²
- Vector quantity
### Lines
- Radial inward
- Never intersect
### Superposition
- Vector addition`;

    // Wait for libraries to load
    setTimeout(() => {
      try {
        const { Transformer } = window.markmap;
        const { Markmap } = window.markmap;
        
        // Transform markdown
        const transformer = new Transformer();
        const { root } = transformer.transform(markdown);
        
        // Create markmap
        const svg = document.getElementById('markmap');
        const mm = Markmap.create(svg, {
          color: (node) => {
            const colors = ['#6366F1', '#2DD4BF', '#818CF8', '#8083ff', '#a78bfa'];
            return colors[node.depth % colors.length];
          },
          duration: 500,
          maxWidth: 250,
          paddingX: 15,
          spacingVertical: 8,
          spacingHorizontal: 60,
          autoFit: true,
          zoom: true,
          pan: true,
          nodeFont: 'Lexend, -apple-system, sans-serif',
          nodeFontSize: 14
        }, root);
        
        // Fit to screen
        mm.fit();
        
        // Hide loading
        document.getElementById('loading').style.display = 'none';
        
        console.log('✅ Markmap loaded successfully!');
      } catch (error) {
        console.error('❌ Markmap error:', error);
        document.getElementById('loading').textContent = 'Error loading mind map. Check console.';
        document.getElementById('loading').style.color = '#ef4444';
      }
    }, 1000);
  </script>
</body>
</html>
